<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heating Fuel Cost Estimator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e5e2;
      padding: 2rem;
      width: 100%;
      max-width: 680px;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 14px;
      color: #6b6b68;
      margin-bottom: 1.75rem;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 560px) {
      .input-grid { grid-template-columns: 1fr 1fr; }
      .therm-wrap { grid-column: 1 / -1; }
      .calc-btn { grid-column: 1 / -1; }
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label {
      font-size: 12px;
      font-weight: 500;
      color: #6b6b68;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field input {
      height: 36px;
      border: 1px solid #d5d5d2;
      border-radius: 8px;
      padding: 0 10px;
      font-size: 15px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }

    .field input:focus { border-color: #888; }

    .price-wrap, .sqft-wrap {
      display: flex;
      align-items: center;
      border: 1px solid #d5d5d2;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
      height: 36px;
      transition: border-color 0.15s;
    }

    .price-wrap:focus-within, .sqft-wrap:focus-within { border-color: #888; }

    .price-wrap .prefix {
      padding: 0 10px;
      color: #999;
      font-size: 15px;
      border-right: 1px solid #e5e5e2;
      height: 100%;
      display: flex;
      align-items: center;
    }

    .sqft-wrap .suffix {
      padding: 0 10px;
      color: #999;
      font-size: 13px;
      border-left: 1px solid #e5e5e2;
      height: 100%;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .price-wrap input, .sqft-wrap input {
      border: none;
      border-radius: 0;
      flex: 1;
      min-width: 0;
      height: 100%;
    }

    .price-wrap input:focus, .sqft-wrap input:focus { border: none; }

    .calc-btn {
      height: 36px;
      padding: 0 20px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .calc-btn:hover { background: #333; }

    .error {
      font-size: 13px;
      color: #c0392b;
      margin-bottom: 1rem;
      display: none;
    }

    .results { display: none; }

    .region-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f5f5f3;
      border: 1px solid #e5e5e2;
      border-radius: 100px;
      padding: 4px 12px;
      font-size: 13px;
      color: #6b6b68;
      margin-bottom: 1.25rem;
    }

    .region-badge strong { color: #1a1a1a; font-weight: 500; }

    .year-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 480px) { .year-cards { grid-template-columns: 1fr; } }

    .year-card {
      background: #fff;
      border: 1px solid #e5e5e2;
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }

    .year-card.highlight { border: 2px solid #3b82f6; }

    .year-label {
      font-size: 12px;
      color: #6b6b68;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .recent-badge {
      font-size: 11px;
      background: #eff6ff;
      color: #2563eb;
      padding: 2px 7px;
      border-radius: 100px;
    }

    .year-cost {
      font-size: 24px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .year-detail {
      font-size: 12px;
      color: #6b6b68;
      line-height: 1.6;
    }

    .year-detail strong { color: #1a1a1a; font-weight: 500; }

    .avg-row {
      background: #f5f5f3;
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      margin-bottom: 1rem;
    }

    .avg-label { color: #6b6b68; }
    .avg-value { font-weight: 500; font-size: 16px; }

    .assumptions {
      font-size: 12px;
      color: #999;
      line-height: 1.7;
    }

    .insulation-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .insulation-label {
      font-size: 12px;
      font-weight: 500;
      color: #6b6b68;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .insulation-seg {
      display: flex;
      border: 1px solid #d5d5d2;
      border-radius: 8px;
      overflow: hidden;
      flex: 1;
    }

    .seg-btn {
      flex: 1;
      height: 36px;
      border: none;
      border-right: 1px solid #d5d5d2;
      background: #fff;
      font-size: 13px;
      color: #6b6b68;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .seg-btn:last-child { border-right: none; }
    .seg-btn:hover:not(.seg-btn--active) { background: #f5f5f3; }
    .seg-btn--active { background: #1a1a1a; color: #fff; font-weight: 500; }

    @media (max-width: 480px) {
      .insulation-row { flex-direction: column; align-items: flex-start; }
      .insulation-seg { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Heating Fuel Cost Estimator</h1>
    <p class="subtitle">Estimate your seasonal heating oil cost using actual weather data for your zip code.</p>

    <div class="input-grid">
      <div class="field">
        <label>Zip code</label>
        <input type="text" id="zip" placeholder="e.g. 02101" maxlength="5" />
      </div>
      <div class="field">
        <label>Home size</label>
        <div class="sqft-wrap">
          <input type="number" id="sqft" placeholder="1500" min="100" max="20000" step="100" value="1500" />
          <span class="suffix">sq ft</span>
        </div>
      </div>
      <div class="field">
        <label>Price per gallon</label>
        <div class="price-wrap">
          <span class="prefix">$</span>
          <input type="number" id="price" placeholder="4.50" min="0.01" step="0.01" value="4.50" />
        </div>
      </div>
      <div class="field therm-wrap">
        <label>Thermostat</label>
        <div class="sqft-wrap">
          <input type="number" id="thermostat" value="68" min="55" max="80" step="1" />
          <span class="suffix">°F</span>
        </div>
      </div>
      <button class="calc-btn" onclick="calculate()">Estimate &rarr;</button>
    </div>

    <div class="insulation-row">
      <span class="insulation-label">Insulation</span>
      <div class="insulation-seg" id="insulationSeg">
        <button type="button" class="seg-btn" data-ua="0.15" data-label="new / tight construction" onclick="selectInsulation(this)">New / tight</button>
        <button type="button" class="seg-btn seg-btn--active" data-ua="0.35" data-label="average insulation" onclick="selectInsulation(this)">Average</button>
        <button type="button" class="seg-btn" data-ua="0.75" data-label="older / drafty construction" onclick="selectInsulation(this)">Older / drafty</button>
      </div>
    </div>

    <div class="error" id="error"></div>

    <div class="results" id="results">
      <div class="region-badge">
        &#x1F4CD; Location: <strong id="regionName"></strong>
      </div>
      <div class="year-cards" id="yearCards"></div>
      <div class="avg-row">
        <span class="avg-label">3-year average estimated cost</span>
        <span class="avg-value" id="avgCost"></span>
      </div>
      <p class="assumptions" id="assumptions"></p>
    </div>
  </div>

  <script>
    const EFFICIENCY = 0.85;
    const BTU_PER_GAL = 138500;
    const HDD_BASE = 65;

    function selectInsulation(btn) {
      document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('seg-btn--active'));
      btn.classList.add('seg-btn--active');
    }

    function getSeasons() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      // A season ends in April; if we're past April the current-year season is complete
      const lastEndYear = month > 4 ? year : year - 1;
      const seasons = [];
      for (let i = 0; i < 3; i++) {
        const endYear = lastEndYear - i;
        seasons.push({
          label: `${endYear - 1}–${String(endYear).slice(2)}`,
          start: `${endYear - 1}-10-01`,
          end:   `${endYear}-04-30`
        });
      }
      return seasons;
    }

    async function calculate() {
      const zip        = document.getElementById('zip').value.trim();
      const price      = parseFloat(document.getElementById('price').value);
      const sqft       = parseFloat(document.getElementById('sqft').value);
      const thermostat = parseFloat(document.getElementById('thermostat').value);
      const errorEl  = document.getElementById('error');
      const resultsEl = document.getElementById('results');
      const btn      = document.querySelector('.calc-btn');

      errorEl.style.display  = 'none';
      resultsEl.style.display = 'none';

      if (!/^\d{5}$/.test(zip))              { errorEl.textContent = 'Please enter a valid 5-digit zip code.';                        errorEl.style.display = 'block'; return; }
      if (!sqft || sqft < 100 || sqft > 20000) { errorEl.textContent = 'Please enter a home size between 100 and 20,000 sq ft.'; errorEl.style.display = 'block'; return; }
      if (!price || price <= 0)              { errorEl.textContent = 'Please enter a valid price per gallon.';                        errorEl.style.display = 'block'; return; }
      if (!thermostat || thermostat < 55 || thermostat > 80) { errorEl.textContent = 'Please enter a thermostat setting between 55°F and 80°F.'; errorEl.style.display = 'block'; return; }

      btn.textContent = 'Loading…';
      btn.disabled = true;

      try {
        // Step 1 — geocode zip to lat/lon
        const geoRes = await fetch(`https://api.zippopotam.us/us/${zip}`);
        if (!geoRes.ok) throw new Error('Zip code not found. Please check the zip code and try again.');
        const geoData = await geoRes.json();
        if (!geoData.places || geoData.places.length === 0) throw new Error('No location found for that zip code.');
        const place = geoData.places[0];
        const lat   = parseFloat(place.latitude);
        const lon   = parseFloat(place.longitude);
        const locationName = `${place['place name']}, ${place['state abbreviation']}`;

        // Step 2 — fetch 3 heating seasons of daily temps from Open-Meteo archive
        const seasons   = getSeasons();
        const startDate = seasons[seasons.length - 1].start;
        const endDate   = seasons[0].end;
        const weatherUrl = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${startDate}&end_date=${endDate}&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=auto`;
        const weatherRes = await fetch(weatherUrl);
        if (!weatherRes.ok) throw new Error('Unable to fetch weather data. Please try again.');
        const weatherData = await weatherRes.json();
        if (!weatherData.daily) throw new Error('Unexpected response from weather service.');

        const dates = weatherData.daily.time;
        const tmax  = weatherData.daily.temperature_2m_max;
        const tmin  = weatherData.daily.temperature_2m_min;

        // Step 3 — calculate HDDs per season and estimate costs
        const activeBtn   = document.querySelector('.seg-btn--active');
        const UA_PER_SQFT = parseFloat(activeBtn.dataset.ua);
        const insulLabel  = activeBtn.dataset.label;
        const Cd          = 0.65;  // ASHRAE degree-day correction for internal heat gains
        const BTU_PER_HDD = sqft * UA_PER_SQFT * 24 * Cd;
        const gallonsPerHDD = (BTU_PER_HDD / BTU_PER_GAL) / EFFICIENCY;

        const results = seasons.map(season => {
          let hdd = 0;
          for (let i = 0; i < dates.length; i++) {
            if (dates[i] < season.start || dates[i] > season.end) continue;
            if (tmax[i] === null || tmin[i] === null) continue;
            hdd += Math.max(0, thermostat - (tmax[i] + tmin[i]) / 2);
          }
          hdd = Math.round(hdd);
          const gallons = Math.round(hdd * gallonsPerHDD);
          const cost    = gallons * price;
          return { label: season.label, hdd, gallons, cost };
        });

        // Step 4 — render
        document.getElementById('regionName').textContent = locationName;

        document.getElementById('yearCards').innerHTML = results.map((c, i) => `
          <div class="year-card${i === 0 ? ' highlight' : ''}">
            <div class="year-label">
              ${c.label} season
              ${i === 0 ? '<span class="recent-badge">most recent</span>' : ''}
            </div>
            <div class="year-cost">${c.cost.toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 })}</div>
            <div class="year-detail">
              <strong>${c.hdd.toLocaleString()}</strong> heating degree days<br>
              <strong>~${c.gallons.toLocaleString()}</strong> gallons estimated
            </div>
          </div>
        `).join('');

        const avg = results.reduce((s, c) => s + c.cost, 0) / results.length;
        document.getElementById('avgCost').textContent = avg.toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });

        document.getElementById('assumptions').textContent = `Assumes a ${sqft.toLocaleString()} sq ft home with ${insulLabel}, oil furnace at 85% efficiency, UA = ${UA_PER_SQFT} BTU/hr/°F/sq ft, and an ASHRAE degree-day correction factor (Cd) of 0.65 for internal heat gains. Heating degree days (HDD) are base-${thermostat}°F (your thermostat setting), calculated from actual daily temperature records via Open-Meteo for ${locationName}. Actual usage varies by equipment efficiency.`;

        resultsEl.style.display = 'block';

      } catch (err) {
        errorEl.textContent = err.message || 'Something went wrong. Please try again.';
        errorEl.style.display = 'block';
      } finally {
        btn.innerHTML = 'Estimate &rarr;';
        btn.disabled = false;
      }
    }

    ['zip', 'sqft', 'price', 'thermostat'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
    });
  </script>
</body>
</html>
